version: "3.9"

# Pipemind Coordination Agent — Docker Compose stack
# All credentials are injected at runtime via 1Password CLI:
#   op run --env-file=.env -- docker compose up -d
# Never run docker compose up directly — secrets will not resolve.

services:

  # ---------------------------------------------------------------------------
  # Postgres — persistent state (drafts, memory, roster, mute list)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16.3
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - pipemind

  # ---------------------------------------------------------------------------
  # n8n — workflow orchestrator
  # ---------------------------------------------------------------------------
  n8n:
    image: n8nio/n8n:1.47.1
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      # Database
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}

      # Encryption
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}

      # Basic auth (web UI)
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}

      # General
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/

      # Required config values — n8n will start but workflows will fail
      # visibly if these are absent (validated in startup workflows)
      DRIVE_FOLDER_ID: ${DRIVE_FOLDER_ID}
      CLIENT_EMAIL: ${CLIENT_EMAIL}
      EOD_TIME: ${EOD_TIME}
      REPORT_DAY_TIME: ${REPORT_DAY_TIME}
      # Hardcoded path constant — not a secret, not from .env
      ROSTER_CONFIG_PATH: /data/roster.yml

      # Integration credentials
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      CLOCKIFY_API_KEY: ${CLOCKIFY_API_KEY}
      CLOCKIFY_WORKSPACE_ID: ${CLOCKIFY_WORKSPACE_ID}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      GITHUB_REPO: ${GITHUB_REPO}
      JIRA_EMAIL: ${JIRA_EMAIL}
      JIRA_API_TOKEN: ${JIRA_API_TOKEN}
      JIRA_SITE_URL: ${JIRA_SITE_URL}
      JIRA_PROJECT_KEY: ${JIRA_PROJECT_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REFRESH_TOKEN: ${GOOGLE_REFRESH_TOKEN}

      # Ollama — local LLM endpoint (never an external URL — SC-11)
      OLLAMA_BASE_URL: http://ollama:11434

      # P1 additions
      CHECKIN_TIME: ${CHECKIN_TIME}
      WHISPER_BASE_URL: http://whisper:9000

    volumes:
      - n8n_data:/home/node/.n8n
      - ./roster.yml:/data/roster.yml:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pipemind

  # ---------------------------------------------------------------------------
  # Ollama — local LLM server (OpenAI-compatible API)
  # SC-11: Never replace with an external LLM endpoint.
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:0.2.8
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - pipemind

  # ---------------------------------------------------------------------------
  # Whisper ASR — self-hosted audio transcription (SC-10)
  # Required for standup audio file ingestion (F-04.2).
  # SC-10: Must remain self-hosted; never replace with a cloud transcription API.
  # ---------------------------------------------------------------------------
  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    restart: unless-stopped
    environment:
      ASR_MODEL: base.en
      ASR_ENGINE: openai_whisper
    ports:
      - "9000:9000"
    volumes:
      - whisper_models:/root/.cache/whisper
    networks:
      - pipemind

  # ---------------------------------------------------------------------------
  # Langfuse — LLM observability (optional; uncomment to enable)
  # Requires additional env vars: LANGFUSE_SECRET_KEY, LANGFUSE_PUBLIC_KEY,
  # NEXTAUTH_SECRET, NEXTAUTH_URL, DATABASE_URL (can share the postgres service).
  # ---------------------------------------------------------------------------
  # langfuse:
  #   image: langfuse/langfuse:2.68.0
  #   restart: unless-stopped
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
  #     NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
  #     NEXTAUTH_URL: http://localhost:3000
  #     LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
  #     LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
  #     SALT: ${LANGFUSE_SALT}
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   networks:
  #     - pipemind

volumes:
  postgres_data:
    driver: local
  n8n_data:
    driver: local
  ollama_models:
    driver: local
  whisper_models:
    driver: local

networks:
  pipemind:
    driver: bridge
